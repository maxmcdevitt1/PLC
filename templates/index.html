<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC HMI Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: Consolas, "Courier New", monospace;
            background: #0b0f14;
            color: #e6edf3;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #30363d;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 1px;
        }

        .timestamp {
            color: #8b949e;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .panel-title {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .machine-state {
            font-size: 36px;
            font-weight: bold;
            padding: 24px;
            text-align: center;
            border-radius: 8px;
            background: #0d1117;
            border: 2px solid #30363d;
            margin-bottom: 20px;
        }

        .part-count {
            font-size: 72px;
            font-weight: bold;
            text-align: center;
            padding: 30px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 8px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding: 14px 0;
            font-size: 18px;
        }

        .row:last-child {
            border-bottom: none;
        }

        .label {
            color: #8b949e;
        }

        .value {
            font-weight: bold;
        }

        .status-light {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 10px;
            background: #555;
            vertical-align: middle;
        }

        .ok {
            color: #3fb950;
        }

        .bad {
            color: #f85149;
        }

        .warn {
            color: #d29922;
        }

        .neutral {
            color: #8b949e;
        }

        .light-ok {
            background: #3fb950;
            box-shadow: 0 0 12px #3fb950;
        }

        .light-bad {
            background: #f85149;
            box-shadow: 0 0 12px #f85149;
        }

        .light-warn {
            background: #d29922;
            box-shadow: 0 0 12px #d29922;
        }

        .error-box {
            margin-top: 24px;
            padding: 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #f85149;
            min-height: 54px;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .machine-state {
                font-size: 28px;
            }

            .part-count {
                font-size: 56px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>PLC HMI DASHBOARD</h1>
            <div class="timestamp">
                Last Update: <span id="last_update">---</span>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <h2 class="panel-title">Machine Status</h2>

                <div id="machine_state" class="machine-state neutral">
                    STARTING
                </div>

                <h2 class="panel-title">Part Count</h2>

                <div id="part_count" class="part-count">
                    ---
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">PLC Connection</h2>

                <div class="row">
                    <span class="label">Connection</span>
                    <span id="connected" class="value neutral">
                        <span id="connection_light" class="status-light"></span>
                        ---
                    </span>
                </div>

                <h2 class="panel-title" style="margin-top: 28px;">Inputs / Outputs</h2>

                <div class="row">
                    <span class="label">FULL</span>
                    <span id="coil_full" class="value neutral">---</span>
                </div>

                <div class="row">
                    <span class="label">ROBOT MOVING</span>
                    <span id="coil_robot_moving" class="value neutral">---</span>
                </div>

                <div class="row">
                    <span class="label">PHOTOEYE</span>
                    <span id="coil_photoeye" class="value neutral">---</span>
                </div>

                <div class="row">
                    <span class="label">AUTO MODE</span>
                    <span id="coil_auto_mode" class="value neutral">---</span>
                </div>

                <div class="row">
                    <span class="label">ENABLE</span>
                    <span id="coil_enable" class="value neutral">---</span>
                </div>
            </div>
        </div>

        <div class="error-box">
            <strong>Error:</strong>
            <span id="error">None</span>
        </div>
    </div>

    <script>
        function setText(id, text) {
            document.getElementById(id).textContent = text;
        }

        function setClass(id, className) {
            document.getElementById(id).className = className;
        }

        function formatBool(value) {
            if (value === true) return "ON";
            if (value === false) return "OFF";
            return "---";
        }

        function boolClass(value) {
            if (value === true) return "value ok";
            if (value === false) return "value bad";
            return "value neutral";
        }

        function getCoil(data, name) {
            if (data.coils && name in data.coils) {
                return data.coils[name];
            }

            if (name in data) {
                return data[name];
            }

            return null;
        }

        function updateCoil(id, data, name) {
            const value = getCoil(data, name);
            setText(id, formatBool(value));
            setClass(id, boolClass(value));
        }

        function machineStateClass(state) {
            const text = String(state).toUpperCase();

            if (
                text.includes("ERROR") ||
                text.includes("FAILED") ||
                text.includes("FAULT")
            ) {
                return "machine-state bad";
            }

            if (
                text.includes("STOPPED") ||
                text.includes("FULL") ||
                text.includes("NOT READY")
            ) {
                return "machine-state warn";
            }

            if (
                text.includes("READY") ||
                text.includes("RUNNING") ||
                text.includes("MOVING")
            ) {
                return "machine-state ok";
            }

            return "machine-state neutral";
        }

        async function updateStatus() {
            try {
                const response = await fetch("/api/status");
                const data = await response.json();

                const connected = document.getElementById("connected");
                const connectionLight = document.getElementById("connection_light");

                if (data.connected === true) {
                    connected.childNodes[1].nodeValue = " CONNECTED";
                    connected.className = "value ok";
                    connectionLight.className = "status-light light-ok";
                } else {
                    connected.childNodes[1].nodeValue = " DISCONNECTED";
                    connected.className = "value bad";
                    connectionLight.className = "status-light light-bad";
                }

                const state = data.machine_state ?? "---";
                setText("machine_state", state);
                setClass("machine_state", machineStateClass(state));

                setText("part_count", data.part_count ?? "---");

                updateCoil("coil_full", data, "FULL");
                updateCoil("coil_robot_moving", data, "ROBOT MOVING");
                updateCoil("coil_photoeye", data, "PHOTOEYE");
                updateCoil("coil_auto_mode", data, "AUTO MODE");
                updateCoil("coil_enable", data, "ENABLE");

                setText("error", data.error ?? "None");
                setText("last_update", new Date().toLocaleTimeString());

            } catch (err) {
                const connected = document.getElementById("connected");
                const connectionLight = document.getElementById("connection_light");

                connected.childNodes[1].nodeValue = " BACKEND ERROR";
                connected.className = "value bad";
                connectionLight.className = "status-light light-bad";

                setText("machine_state", "BACKEND ERROR");
                setClass("machine_state", "machine-state bad");

                setText("error", err);
                setText("last_update", new Date().toLocaleTimeString());
            }
        }

        updateStatus();
        setInterval(updateStatus, 1000);
    </script>
</body>

</html>
